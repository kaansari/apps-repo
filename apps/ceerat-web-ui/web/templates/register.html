<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#25635f">
  <link rel="manifest" href="/manifest.json">
  <link rel="stylesheet" href="/static/app.css">
  <script defer src="/static/app.js"></script>
  <title>{{.Title}} | Ceerat</title>
</head>
<body class="auth-page">
  <main class="auth-panel">
    <section class="brand-block" aria-label="Ceerat">
      <div class="brand-mark">C</div>
      <h1>Ceerat</h1>
      <p>Create your account to access the Ceerat platform.</p>
    </section>

    <form class="form-surface" data-auth-form data-endpoint="/api/register" data-success="/" novalidate>
      <div>
        <h2>Register</h2>
        <p class="muted">All fields except company are required.</p>
      </div>
      <label>Name
        <input name="name" type="text" autocomplete="name" required>
      </label>
      <label>Company
        <input name="company" type="text" autocomplete="organization">
      </label>
      <label>Email
        <input name="email" type="email" autocomplete="email" required>
      </label>
      <label>Password
        <input name="password" type="password" autocomplete="new-password" required minlength="1">
      </label>
      <p class="message" data-message role="status" aria-live="polite"></p>
      <button type="submit">Create account</button>
      <a class="text-link" href="/login">Back to login</a>
    </form>
  </main>
</body>
</html>
