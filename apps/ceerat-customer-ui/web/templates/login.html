<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#25635f">
  <link rel="manifest" href="/manifest.json">
  <link rel="stylesheet" href="/static/app.css">
  <script defer src="/static/app.js"></script>
  <title>{{.Title}} | Ceerat</title>
</head>
<body class="auth-page">
  <main class="auth-panel">
    <section class="brand-block" aria-label="Ceerat">
      <div class="brand-mark">C</div>
      <h1>Ceerat</h1>
      <p>Clinical account access for the Ceerat platform.</p>
    </section>

    <form class="form-surface" data-auth-form data-endpoint="/api/login" data-success="/" novalidate>
      <div>
        <h2>Log in</h2>
        <p class="muted">Use your Ceerat account credentials.</p>
      </div>
      <label>Email
        <input name="email" type="email" autocomplete="email" required>
      </label>
      <label>Password
        <input name="password" type="password" autocomplete="current-password" required>
      </label>
      <p class="message" data-message role="status" aria-live="polite"></p>
      <button type="submit">Log in</button>
      <a class="text-link" href="/register">Create an account</a>
    </form>
  </main>
</body>
</html>
