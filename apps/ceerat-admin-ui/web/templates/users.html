<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="/static/admin.css">
  <script defer src="/static/admin.js"></script>
  <title>{{.Title}} | Ceerat Admin</title>
</head>
<body data-page="users">
  <header class="topbar">
    <a class="brand" href="/admin/users"><span class="brand-mark small">C</span><span>Ceerat Admin</span></a>
    <nav><a aria-current="page" href="/admin/users">Users</a><a href="/admin/rbac">RBAC</a></nav>
    <button class="secondary" type="button" data-logout>Logout</button>
  </header>
  <main class="shell">
    <section class="heading">
      <div><p class="eyebrow">Admin</p><h1>User Management</h1></div>
      <button type="button" data-open-user>Create user</button>
    </section>
    <section class="panel">
      <div class="table-wrap">
        <table>
          <thead><tr><th>Name</th><th>Email</th><th>Company</th><th>Role</th><th></th></tr></thead>
          <tbody data-users><tr><td colspan="5">Loading...</td></tr></tbody>
        </table>
      </div>
    </section>
    <section class="panel" data-user-form-panel hidden>
      <div class="panel-heading"><h2 data-user-form-title>Create user</h2></div>
      <form class="grid-form" data-user-form>
        <input type="hidden" name="id">
        <label>Name<input name="name"></label>
        <label>Company<input name="company"></label>
        <label>Email<input name="email" type="email" required></label>
        <label>Role<select name="role" data-role-options></select></label>
        <label>Password<input name="password" type="password"></label>
        <div class="actions">
          <button type="submit">Save</button>
          <button class="secondary" type="button" data-cancel-user>Cancel</button>
        </div>
        <p class="message" data-message></p>
      </form>
    </section>
  </main>
</body>
</html>
